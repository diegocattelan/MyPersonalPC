[custom.system]
command = '''
os_name="$(uname -s 2>/dev/null || printf Unknown)"
case "$os_name" in
  Darwin)
    printf '¾░ÇÁ macOS'
    ;;
  Linux)
    if [ -r /etc/os-release ]; then
      name=$(awk -F= '$1 == "NAME" { gsub(/^"|"$/, "", $2); print $2; exit }' /etc/os-release)
      printf '¾░î¢ %s' "${name:-Linux}"
    else
      printf '¾░î¢ Linux'
    fi
    ;;
  *)
    printf '%s' "$os_name"
    ;;
esac
'''
when = "true"
style = "fg:color_fg0"
format = '[¯éÂ](fg:color_orange)[SYS     ](bold fg:color_bg_console bg:color_orange)[¯é░](fg:color_orange)[ $output ]($style)'

[hostname]
disabled = false
ssh_only = false
format = '[¯éÂ](fg:color_orange)[NODE    ](bold fg:color_bg_console bg:color_orange)[¯é░](fg:color_orange)[ $hostname]($style)'
style = "fg:color_fg0"

[custom.connection]
command = '''
user_name=${USER:-$(id -un 2>/dev/null || printf unknown)}
if [ -n "${SSH_CONNECTION:-}" ]; then
  set -- $SSH_CONNECTION
  printf '%s SSH %s' "$user_name" "$1"
elif [ -n "${SSH_CLIENT:-}" ]; then
  set -- $SSH_CLIENT
  printf '%s SSH %s' "$user_name" "$1"
elif [ -n "${SSH_TTY:-}" ]; then
  printf '%s SSH' "$user_name"
else
  printf '%s LOCAL' "$user_name"
fi
'''
when = "true"
style = "fg:color_fg0"
format = '[¯éÂ](fg:color_orange)[CONN    ](bold fg:color_bg_console bg:color_orange)[¯é░](fg:color_orange)[ $output]($style)'

