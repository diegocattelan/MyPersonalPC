"$schema" = 'https://starship.rs/config-schema.json'

format = """
${custom.exit_rail_ok}${custom.exit_rail_err}${custom.status_fill_ok}${custom.status_fill_err}$status\
\n\
${custom.exit_rail_ok}${custom.exit_rail_err}\
${custom.system}\
$hostname\
\n\
${custom.link_ok}${custom.link_err}${custom.link_none_ok}${custom.link_none_err}\
\n\
${custom.exit_rail_ok}${custom.exit_rail_err}\
${custom.connection}\
${custom.session_context}\
\n\
${custom.exit_rail_ok}${custom.exit_rail_err}\
$directory\
${custom.folder_context}\
\n\
${custom.exit_rail_ok}${custom.exit_rail_err}\
$time\
$cmd_duration\
$line_break${custom.exit_rail_ok}${custom.exit_rail_err}$character"""

