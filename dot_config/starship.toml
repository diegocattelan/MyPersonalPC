"$schema" = 'https://starship.rs/config-schema.json'

format = """
${custom.exit_rail_ok}${custom.exit_rail_err}${custom.status_fill_ok}${custom.status_fill_err}$status\
\n\
${custom.exit_rail_ok}${custom.exit_rail_err}\
${custom.system}\
$hostname\
\n\
${custom.link_ok}${custom.link_err}${custom.link_none_ok}${custom.link_none_err}\
\n\
${custom.exit_rail_ok}${custom.exit_rail_err}\
${custom.connection}\
${custom.session_context}\
\n\
${custom.exit_rail_ok}${custom.exit_rail_err}\
$directory\
${custom.folder_context}\
\n\
${custom.exit_rail_ok}${custom.exit_rail_err}\
$time\
$cmd_duration\
$line_break${custom.exit_rail_ok}${custom.exit_rail_err}$character"""

palette = 'lcars_classic'

[palettes.lcars_classic]
color_bg_console = '#000000'
color_fg0 = '#f5f6fa'
color_bg1 = '#666688'
color_bg3 = '#666688'
color_blue = '#5566ff'
color_aqua = '#99ccff'
color_green = '#999933'
color_orange = '#ff8800'
color_purple = '#9966ff'
color_red = '#cf4f4f'
color_yellow = '#ffcc33'

[fill]
symbol = " "
style = "bg:color_green"

[os]
disabled = true

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CachyOS = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[custom.system]
command = '''
os_name="$(uname -s 2>/dev/null || printf Unknown)"
case "$os_name" in
  Darwin)
    printf '󰀵 macOS'
    ;;
  Linux)
    if [ -r /etc/os-release ]; then
      name=$(awk -F= '$1 == "NAME" { gsub(/^"|"$/, "", $2); print $2; exit }' /etc/os-release)
      printf '󰌽 %s' "${name:-Linux}"
    else
      printf '󰌽 Linux'
    fi
    ;;
  *)
    printf '%s' "$os_name"
    ;;
esac
'''
when = "true"
style = "fg:color_fg0"
format = '[](fg:color_orange)[SYS     ](bold fg:color_bg_console bg:color_orange)[](fg:color_orange)[ $output ]($style)'

[hostname]
disabled = false
ssh_only = false
format = '[](fg:color_orange)[NODE    ](bold fg:color_bg_console bg:color_orange)[](fg:color_orange)[ $hostname]($style)'
style = "fg:color_fg0"

[custom.connection]
command = '''
user_name=${USER:-$(id -un 2>/dev/null || printf unknown)}
if [ -n "${SSH_CONNECTION:-}" ]; then
  set -- $SSH_CONNECTION
  printf '%s SSH %s' "$user_name" "$1"
elif [ -n "${SSH_CLIENT:-}" ]; then
  set -- $SSH_CLIENT
  printf '%s SSH %s' "$user_name" "$1"
elif [ -n "${SSH_TTY:-}" ]; then
  printf '%s SSH' "$user_name"
else
  printf '%s LOCAL' "$user_name"
fi
'''
when = "true"
style = "fg:color_fg0"
format = '[](fg:color_orange)[CONN    ](bold fg:color_bg_console bg:color_orange)[](fg:color_orange)[ $output]($style)'

[localip]
disabled = true
ssh_only = false
format = '[](fg:color_orange)[LINK    ](bold fg:color_bg_console bg:color_orange)[](fg:color_orange)[ $localipv4]($style)'
style = "fg:color_fg0"

[custom.exit_rail_ok]
command = "printf '█'"
when = '[ "${STARSHIP_CMD_STATUS:-0}" -eq 0 ]'
style = "fg:color_green"
format = '[$output]($style)'

[custom.exit_rail_err]
command = "printf '█'"
when = '[ "${STARSHIP_CMD_STATUS:-0}" -ne 0 ]'
style = "fg:color_red"
format = '[$output]($style)'

[custom.status_fill_ok]
command = "printf '█'"
when = '[ "${STARSHIP_CMD_STATUS:-0}" -eq 0 ]'
style = "fg:color_green"
format = '[$output]($style)'

[custom.status_fill_err]
command = "printf '█'"
when = '[ "${STARSHIP_CMD_STATUS:-0}" -ne 0 ]'
style = "fg:color_red"
format = '[$output]($style)'

[custom.link_ok]
command = "$HOME/.local/bin/starship-link-ips"
when = '[ "${STARSHIP_CMD_STATUS:-0}" -eq 0 ] && "$HOME/.local/bin/starship-link-ips" --check'
style = "fg:color_fg0"
format = '[█](fg:color_green)[](fg:color_orange)[LINK    ](bold fg:color_bg_console bg:color_orange)[](fg:color_orange)[ ](fg:color_fg0)$output'

[custom.link_err]
command = "$HOME/.local/bin/starship-link-ips"
when = '[ "${STARSHIP_CMD_STATUS:-0}" -ne 0 ] && "$HOME/.local/bin/starship-link-ips" --check'
style = "fg:color_fg0"
format = '[█](fg:color_red)[](fg:color_orange)[LINK    ](bold fg:color_bg_console bg:color_orange)[](fg:color_orange)[ ](fg:color_fg0)$output'

[custom.link_none_ok]
command = "printf 'NO PHYSICAL LINK'"
when = '[ "${STARSHIP_CMD_STATUS:-0}" -eq 0 ] && ! "$HOME/.local/bin/starship-link-ips" --check >/dev/null 2>&1'
style = "fg:color_fg0"
format = '[█](fg:color_green)[](fg:color_orange)[LINK    ](bold fg:color_bg_console bg:color_orange)[](fg:color_orange)[ $output]($style)'

[custom.link_none_err]
command = "printf 'NO PHYSICAL LINK'"
when = '[ "${STARSHIP_CMD_STATUS:-0}" -ne 0 ] && ! "$HOME/.local/bin/starship-link-ips" --check >/dev/null 2>&1'
style = "fg:color_fg0"
format = '[█](fg:color_red)[](fg:color_orange)[LINK    ](bold fg:color_bg_console bg:color_orange)[](fg:color_orange)[ $output]($style)'

[directory]
style = "fg:color_fg0"
format = "[](fg:color_yellow)[LOC     ](bold fg:color_bg_console bg:color_yellow)[](fg:color_yellow)[ $path]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "fg:color_fg0"
format = '[](fg:color_aqua)[GIT     ](bold fg:color_bg_console bg:color_aqua)[](fg:color_aqua)[ $symbol $branch]($style)'

[git_status]
style = "fg:color_fg0"
format = '[ $all_status$ahead_behind]($style)'

[custom.folder_context]
command = "$HOME/.local/bin/starship-folder-context"
when = '"$HOME/.local/bin/starship-folder-context" --check'
style = "fg:color_fg0"
format = "\n$output"

[custom.session_context]
command = "$HOME/.local/bin/starship-session-context"
when = '"$HOME/.local/bin/starship-session-context" --check'
style = "fg:color_fg0"
format = "\n$output"

[nodejs]
symbol = ""
style = "fg:color_fg0"
format = '[](fg:color_blue)[NODEJS  ](bold fg:color_bg_console bg:color_blue)[](fg:color_blue)[ $symbol( $version)]($style)'

[c]
symbol = " "
style = "fg:color_fg0"
format = '[](fg:color_blue)[C       ](bold fg:color_bg_console bg:color_blue)[](fg:color_blue)[ $symbol( $version)]($style)'

[rust]
symbol = ""
style = "fg:color_fg0"
format = '[](fg:color_blue)[RUST    ](bold fg:color_bg_console bg:color_blue)[](fg:color_blue)[ $symbol( $version)]($style)'

[golang]
symbol = ""
style = "fg:color_fg0"
format = '[](fg:color_blue)[GO      ](bold fg:color_bg_console bg:color_blue)[](fg:color_blue)[ $symbol( $version)]($style)'

[php]
symbol = ""
style = "fg:color_fg0"
format = '[](fg:color_blue)[PHP     ](bold fg:color_bg_console bg:color_blue)[](fg:color_blue)[ $symbol( $version)]($style)'

[java]
symbol = " "
style = "fg:color_fg0"
format = '[](fg:color_blue)[JAVA    ](bold fg:color_bg_console bg:color_blue)[](fg:color_blue)[ $symbol( $version)]($style)'

[kotlin]
symbol = ""
style = "fg:color_fg0"
format = '[](fg:color_blue)[KOTLIN  ](bold fg:color_bg_console bg:color_blue)[](fg:color_blue)[ $symbol( $version)]($style)'

[haskell]
symbol = ""
style = "fg:color_fg0"
format = '[](fg:color_blue)[HASKELL ](bold fg:color_bg_console bg:color_blue)[](fg:color_blue)[ $symbol( $version)]($style)'

[python]
symbol = ""
style = "fg:color_fg0"
format = '[](fg:color_blue)[PYTHON  ](bold fg:color_bg_console bg:color_blue)[](fg:color_blue)[ $symbol( $version)]($style)'

[docker_context]
symbol = ""
style = "fg:color_fg0"
format = '[](fg:color_bg3)[DOCKER  ](bold fg:#fff2cc bg:color_bg3)[](fg:color_bg3)[ $symbol( $context)]($style)'

[conda]
style = "fg:color_fg0"
format = '[](fg:color_bg3)[CONDA   ](bold fg:#fff2cc bg:color_bg3)[](fg:color_bg3)[ $symbol( $environment)]($style)'

[time]
disabled = false
time_format = "%Y-%m-%d %H:%M"
style = "fg:color_fg0"
format = '[](fg:color_purple)[CHRONO  ](bold fg:color_bg_console bg:color_purple)[](fg:color_purple)[ $time]($style)'

[cmd_duration]
min_time = 1000
style = "fg:color_fg0"
format = ' [CYCLE $duration]($style)'

[status]
disabled = false
style = "bold fg:color_bg_console bg:color_red"
success_style = "bold fg:color_bg_console bg:color_green"
symbol = ""
success_symbol = " "
format = '[ EXIT $status                                                                     ]($style)[ ](fg:prev_bg)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](fg:color_purple)[CMD     ](bold fg:color_bg_console bg:color_purple)[](fg:color_purple)[ ](fg:color_fg0)'
error_symbol = '[](fg:color_red)[CMD     ](bold fg:color_bg_console bg:color_red)[](fg:color_red)[ ](fg:color_fg0)'
vimcmd_symbol = '[](fg:color_blue)[CMD     ](bold fg:color_bg_console bg:color_blue)[](fg:color_blue)[ NAV](fg:color_fg0)'
vimcmd_replace_one_symbol = '[](fg:color_orange)[CMD     ](bold fg:color_bg_console bg:color_orange)[](fg:color_orange)[ REPL](fg:color_fg0)'
vimcmd_replace_symbol = '[](fg:color_orange)[CMD     ](bold fg:color_bg_console bg:color_orange)[](fg:color_orange)[ REPL](fg:color_fg0)'
vimcmd_visual_symbol = '[](fg:color_blue)[CMD     ](bold fg:color_bg_console bg:color_blue)[](fg:color_blue)[ VIS](fg:color_fg0)'

[kubernetes]
disabled = false
detect_env_vars = ['KUBECONFIG']
style = "fg:color_green"
format = '[](fg:color_bg1)[KUBE    ](bold fg:#fff2cc bg:color_bg1)[](fg:color_bg1)[ $symbol $context( \($namespace\))]($style)'

[env_var.KUBECONFIG]
style="fg:color_green"
format='[](fg:color_bg1)[KCFG    ](bold fg:#fff2cc bg:color_bg1)[](fg:color_bg1)[ $env_value]($style)'
